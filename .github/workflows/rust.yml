name: Build RustDesk

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: 安装依赖
        run: |
          sudo apt update && sudo apt install -y libxcb-shape0-dev libxcb-xfixes0-dev \
              libxkbcommon-dev libx11-dev libxtst-dev pkg-config \
              libgtk-3-dev libglib2.0-dev libpango1.0-dev \
              libgdk-pixbuf2.0-dev libxcb-render0-dev \
              libxcb-shape0-dev libxcb-xfixes0-dev

      - name: 编译
        run: cargo build --release

      - name: 上传构建产物
        uses: actions/upload-artifact@v3
        with:
          name: rustdesk
          path: target/release/rustdesk
